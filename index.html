<!DOCTYPE html>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {
      background: #080305;
      font-family: 'Cormorant Garamond', Georgia, serif;
    }

    .scene {
      position: fixed;
      inset: 0;
    }

    .photo {
      position: absolute;
      right: 0;
      top: 0;
      height: 100%;
      width: auto;
      max-width: 55%;
      object-fit: cover;
      object-position: left top;
      filter: grayscale(15%) contrast(1.08) brightness(0.75) sepia(15%);
    }

    .vignette {
      position: absolute;
      inset: 0;
      background:
        linear-gradient(to top,  rgba(8,3,5,0.92) 0%, rgba(8,3,5,0.4) 35%, transparent 65%),
        linear-gradient(to right, rgba(8,3,5,0.55) 0%, transparent 45%);
      pointer-events: none;
    }

    .grain {
      position: absolute;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
    }

    .text {
      position: absolute;
      bottom: 6vh;
      left: 5vw;
      opacity: 0;
      animation: fadein 1.4s ease 0.3s forwards;
      text-align: left;
    }

    .name {
      font-family: 'Perfecto', Georgia, serif;
      font-size: clamp(4rem, 11vw, 9rem);
      font-weight: normal;
      font-style: normal;
      color: #ecddd6;
      line-height: 0.88;
      letter-spacing: 0.02em;
    }

    .icons {
      margin-top: 1.6rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1.4rem;
    }

    .icons a {
      display: flex;
      align-items: center;
      color: #6b3a38;
      text-decoration: none;
      transition: color 0.3s;
    }

    .icons a:hover { color: #ecddd6; }

    .icons svg {
      width: 18px;
      height: 18px;
      fill: currentColor;
    }

    @keyframes fadein {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 600px) {
      .photo {
        height: 85%;
        max-width: 90%;
        object-position: left top;
        top: 0;
      }

      .vignette {
        background:
          linear-gradient(to top, rgba(8,3,5,0.96) 0%, rgba(8,3,5,0.5) 30%, transparent 60%),
          linear-gradient(to right, rgba(8,3,5,0.6) 0%, transparent 50%);
      }

      .text {
        bottom: 4vh;
        left: 6vw;
      }

      .name {
        font-size: clamp(3.2rem, 18vw, 5rem);
      }

      .icons {
        margin-top: 1.2rem;
      }

      .icons svg {
        width: 22px;
        height: 22px;
      }
    }
  </style>
</head>
